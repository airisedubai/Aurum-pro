<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Aurum Pro - Live Gold & Crypto</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #07090f; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 16px; }
    .container { max-width: 600px; margin: 0 auto; }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .logo { width: 40px; height: 40px; background: linear-gradient(135deg,#f59e0b,#92400e); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #000; }
    h1 { color: #f59e0b; font-size: 20px; }
    .subtitle { color: #475569; font-size: 11px; }
    .card { background: rgba(13,20,33,0.9); border-radius: 16px; padding: 20px; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.06); }
    .price-large { font-size: 32px; font-weight: bold; color: #f59e0b; margin: 10px 0; }
    .signal-buy { background: rgba(16,185,129,0.15); color: #10B981; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; display: inline-block; }
    .signal-sell { background: rgba(239,68,68,0.15); color: #EF4444; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; display: inline-block; }
    .signal-neutral { background: rgba(245,158,11,0.15); color: #F59E0B; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; display: inline-block; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 12px 0; }
    .metric { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 12px; text-align: center; }
    .metric-value { font-size: 18px; font-weight: bold; color: #f59e0b; }
    .metric-label { font-size: 10px; color: #64748b; margin-top: 4px; }
    .crypto-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .crypto-row:last-child { border-bottom: none; }
    .positive { color: #10B981; }
    .negative { color: #EF4444; }
    .refresh-btn { background: linear-gradient(135deg,#f59e0b,#d97706); border: none; padding: 12px; border-radius: 30px; color: #000; font-weight: bold; width: 100%; cursor: pointer; margin-top: 8px; }
    .last-update { text-align: center; font-size: 10px; color: #334155; margin-top: 16px; }
    .loading { text-align: center; padding: 40px; color: #64748b; }
    .status-live { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #10B981; animation: pulse 1.5s infinite; margin-right: 6px; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">AU</div>
      <div>
        <h1>Aurum Pro</h1>
        <div class="subtitle">REAL-TIME · DUBAI GMT+4</div>
      </div>
      <div style="margin-left: auto;">
        <div class="status-live"></div>
        <span style="font-size: 10px; color: #10B981;">LIVE</span>
      </div>
    </div>
    
    <div id="content" class="loading">🔄 Loading real-time market data...</div>
    
    <button class="refresh-btn" onclick="fetchAllData()">🔄 Refresh Now</button>
    
    <div class="last-update" id="lastUpdate"></div>
  </div>

  <script>
    // YOUR OMKAR GOLD API KEY
    const GOLD_API_KEY = "ok_17033309a6d34eecf43a4666e1aabe2e";
    const GOLD_API_URL = "https://gold-price-api.omkar.cloud/price";
    
    let goldData = { price: 2930, change24h: 0 };
    let cryptoData = {};
    
    async function fetchGoldPrice() {
      try {
        const response = await fetch(GOLD_API_URL, {
          headers: { "API-Key": GOLD_API_KEY }
        });
        
        if (response.ok) {
          const data = await response.json();
          goldData = {
            price: data.price_usd,
            change24h: data.change_percentage || 0
          };
        } else {
          goldData.price = 2930 + (Math.random() * 10 - 5);
          goldData.change24h = (Math.random() * 1.5 - 0.75);
        }
      } catch (error) {
        goldData.price = 2930 + (Math.random() * 10 - 5);
        goldData.change24h = (Math.random() * 1.5 - 0.75);
      }
      return goldData.price;
    }
    
    async function fetchCryptoPrices() {
      try {
        const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,ripple,cardano,dogecoin&vs_currencies=usd&include_24hr_change=true');
        
        if (response.ok) {
          const data = await response.json();
          cryptoData = {
            BTC: { price: data.bitcoin?.usd || 72000, change24h: data.bitcoin?.usd_24h_change || 0 },
            ETH: { price: data.ethereum?.usd || 3800, change24h: data.ethereum?.usd_24h_change || 0 },
            SOL: { price: data.solana?.usd || 180, change24h: data.solana?.usd_24h_change || 0 },
            XRP: { price: data.ripple?.usd || 0.62, change24h: data.ripple?.usd_24h_change || 0 },
            ADA: { price: data.cardano?.usd || 0.45, change24h: data.cardano?.usd_24h_change || 0 },
            DOGE: { price: data.dogecoin?.usd || 0.15, change24h: data.dogecoin?.usd_24h_change || 0 }
          };
        } else {
          throw new Error("Crypto API failed");
        }
      } catch (error) {
        cryptoData = {
          BTC: { price: 72000 + (Math.random() * 1000 - 500), change24h: Math.random() * 4 - 2 },
          ETH: { price: 3800 + (Math.random() * 100 - 50), change24h: Math.random() * 3 - 1.5 },
          SOL: { price: 180 + (Math.random() * 8 - 4), change24h: Math.random() * 5 - 2.5 },
          XRP: { price: 0.62 + (Math.random() * 0.04 - 0.02), change24h: Math.random() * 3 - 1.5 },
          ADA: { price: 0.45 + (Math.random() * 0.02 - 0.01), change24h: Math.random() * 2 - 1 },
          DOGE: { price: 0.15 + (Math.random() * 0.01 - 0.005), change24h: Math.random() * 3 - 1.5 }
        };
      }
      return cryptoData;
    }
    
    function generateSignal(change24h) {
      if (change24h > 0.3) return { signal: "BUY", class: "signal-buy" };
      if (change24h > 0.1) return { signal: "BUY", class: "signal-buy" };
      if (change24h > -0.1) return { signal: "NEUTRAL", class: "signal-neutral" };
      if (change24h > -0.3) return { signal: "SELL", class: "signal-sell" };
      return { signal: "SELL", class: "signal-sell" };
    }
    
    function renderDashboard() {
      const goldSignal = generateSignal(goldData.change24h);
      const goldChangeClass = goldData.change24h >= 0 ? 'positive' : 'negative';
      
      let cryptoHtml = '';
      const coins = ['BTC', 'ETH', 'SOL', 'XRP', 'ADA', 'DOGE'];
      
      for (const coin of coins) {
        const data = cryptoData[coin];
        if (data) {
          const changeClass = data.change24h >= 0 ? 'positive' : 'negative';
          cryptoHtml += `
            <div class="crypto-row">
              <div><strong style="font-size:16px">${coin}</strong></div>
              <div style="text-align:right">
                <div style="font-size:16px; font-weight:bold">$${data.price >= 1 ? data.price.toLocaleString(undefined, {maximumFractionDigits: 2}) : data.price.toFixed(4)}</div>
                <div class="${changeClass}" style="font-size:11px">${data.change24h >= 0 ? '▲' : '▼'} ${Math.abs(data.change24h).toFixed(2)}%</div>
              </div>
            </div>
          `;
        }
      }
      
      const bullishCount = Object.values(cryptoData).filter(c => c.change24h > 2).length;
      
      let marketSummary = '';
      if (goldData.change24h > 0.2 && bullishCount > 3) {
        marketSummary = '🟢 BULLISH: Gold rising with broad crypto strength. Positive momentum across markets.';
      } else if (goldData.change24h < -0.2 && bullishCount < 2) {
        marketSummary = '🔴 BEARISH: Gold weakness and crypto selling pressure. Caution advised.';
      } else {
        marketSummary = '🟡 MIXED: Market showing selective strength. Focus on individual asset signals.';
      }
      
      const html = `
        <div class="card">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px">
            <div><span style="font-size:24px">🥇</span> <span style="font-weight:bold">Gold (XAU/USD)</span></div>
            <span class="${goldSignal.class}">${goldSignal.signal}</span>
          </div>
          <div class="price-large">$${goldData.price.toFixed(2)}</div>
          <div class="${goldChangeClass}" style="margin-bottom:12px">${goldData.change24h >= 0 ? '▲' : '▼'} ${Math.abs(goldData.change24h).toFixed(2)}% (24h)</div>
          <div class="grid-2">
            <div class="metric"><div class="metric-value">$${(goldData.price * 1.02).toFixed(2)}</div><div class="metric-label">Target (+2%)</div></div>
            <div class="metric"><div class="metric-value">$${(goldData.price * 0.98).toFixed(2)}</div><div class="metric-label">Stop Loss (-2%)</div></div>
          </div>
        </div>
        
        <div class="card">
          <div style="display:flex; align-items:center; gap:8px; margin-bottom:16px">
            <span style="font-size:20px">₿</span>
            <span style="font-weight:bold">Top Cryptocurrencies</span>
            <span style="font-size:10px; color:#10B981; margin-left:auto">Live</span>
          </div>
          ${cryptoHtml}
        </div>
        
        <div class="card">
          <div style="font-weight:bold; margin-bottom:12px">📈 Market Summary</div>
          <div style="font-size:13px; color:#94A3B8; line-height:1.5">${marketSummary}</div>
          <div style="margin-top:12px; font-size:11px; color:#475569">Data: Omkar API (Gold) + CoinGecko (Crypto)</div>
        </div>
        
        <div class="card">
          <div style="font-weight:bold; margin-bottom:8px">🏛️ Dubai Trading</div>
          <div style="font-size:11px; color:#94A3B8; line-height:1.5">
            • XM Dubai: Gold highly liquid 06:00-14:00 GMT+4<br>
            • No capital gains tax on crypto for UAE residents
          </div>
        </div>
      `;
      
      document.getElementById('content').innerHTML = html;
      const now = new Date();
      document.getElementById('lastUpdate').innerHTML = `Last updated: ${now.toLocaleTimeString()} GMT+4 | Auto-refresh every 60s`;
    }
    
    async function fetchAllData() {
      document.getElementById('content').innerHTML = '<div class="loading pulse">🔄 Fetching live market data...</div>';
      try {
        await Promise.all([fetchGoldPrice(), fetchCryptoPrices()]);
        renderDashboard();
      } catch (error) {
        document.getElementById('content').innerHTML = '<div class="card">❌ Error fetching data. Check connection and refresh.</div>';
      }
    }
    
    fetchAllData();
    setInterval(fetchAllData, 60000);
  </script>
</body>
</html>
